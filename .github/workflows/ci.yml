name: ZeroGate CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Secret scanning ────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-secrets

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Check for CHANGE_ME placeholders in non-example files
        run: |
          # Allow placeholders only in .example files and CLAUDE.md
          FOUND=$(grep -rn "CHANGE_ME" \
            --include="*.tf" \
            --include="*.yml" \
            --include="*.yaml" \
            --include="*.sh" \
            --include="*.json" \
            . 2>/dev/null | grep -v ".example" || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Found CHANGE_ME placeholder in non-example file:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No stray placeholders found"

  # ── Terraform validation ───────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format Check
        run: |
          cd infrastructure
          terraform fmt -check -recursive
        id: fmt

      - name: Terraform Init (no backend)
        run: |
          cd infrastructure
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd infrastructure
          terraform validate

      - name: tfsec — Terraform security scanner
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure
          soft_fail: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker Compose validation ──────────────────────────────
  compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: |
          cd docker
          # Create a minimal .env to satisfy variable references
          cat > .env <<'EOF'
          AUTHENTIK_DB_PASSWORD=test
          AUTHENTIK_REDIS_PASSWORD=test
          AUTHENTIK_SECRET_KEY=test
          GUACAMOLE_DB_PASSWORD=test
          GRAFANA_ADMIN_PASSWORD=test
          GRAFANA_SECRET_KEY=test
          CF_TUNNEL_TOKEN=test
          AUTHENTIK_URL=https://auth.example.com
          GUACAMOLE_URL=https://access.example.com
          GRAFANA_OIDC_CLIENT_SECRET=test
          EOF
          docker compose config --quiet
          echo "docker-compose.yml: valid"

      - name: Check no ports published to 0.0.0.0
        run: |
          EXPOSED=$(grep -n '"\d\+:\d\+\|^\s*-\s*[0-9]' docker/docker-compose.yml | grep -v '127.0.0.1' | grep -v '#' || true)
          if [ -n "$EXPOSED" ]; then
            echo "ERROR: Ports may be exposed to 0.0.0.0 in docker-compose.yml:"
            echo "$EXPOSED"
            exit 1
          fi
          echo "OK: No ports exposed to 0.0.0.0 in main compose file"

  # ── YAML/JSON lint ─────────────────────────────────────────
  lint-configs:
    name: Lint Config Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all JSON files
        run: |
          find . -name "*.json" -not -path "*/.git/*" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || { echo "INVALID: $f"; exit 1; }
          done

      - name: Validate all YAML files
        run: |
          pip install pyyaml --quiet
          find . -name "*.yml" -o -name "*.yaml" | grep -v ".git" | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "OK: $f" || { echo "INVALID: $f"; exit 1; }
          done

  # ── Shell script lint ──────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on all scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
          format: gcc

  # ── Security policy gate ───────────────────────────────────
  security-gate:
    name: Security Policy Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, terraform-validate, compose-validate, lint-configs, shellcheck]
    steps:
      - name: All security checks passed
        run: echo "All CI security checks passed — safe to merge"
