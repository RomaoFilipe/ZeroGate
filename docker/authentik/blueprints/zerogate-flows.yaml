# ============================================================
# Authentik Blueprint — ZeroGate flows & policies
# Apply via: Admin UI → System → Blueprints → Import
# Or: docker exec zerogate-authentik-worker-1 ak apply_blueprint /blueprints/zerogate-flows.yaml
# ============================================================

version: 1
metadata:
  name: ZeroGate Core Flows
  labels:
    blueprints.goauthentik.io/description: ZeroGate authentication flows with mandatory MFA (TOTP + WebAuthn/Passkey)

entries:

  # ============================================================
  # SECURITY POLICIES
  # ============================================================

  # Password policy: min 14 chars, complexity, HaveIBeenPwned
  - model: authentik_policies_password.PasswordPolicy
    state: present
    identifiers:
      name: zerogate-password-policy
    attrs:
      name: zerogate-password-policy
      min_length: 14
      min_uppercase: 1
      min_lowercase: 1
      min_digits: 1
      min_symbols: 1
      error_message: "Password must be at least 14 characters with uppercase, lowercase, digits, and symbols."
      check_have_i_been_pwned: true
      hibp_allowed_count: 0

  # Account lockout after 5 failed attempts (reputation score -5)
  - model: authentik_policies_reputation.ReputationPolicy
    state: present
    identifiers:
      name: zerogate-brute-force-protection
    attrs:
      name: zerogate-brute-force-protection
      check_ip: true
      check_username: true
      threshold: -5

  # ============================================================
  # MFA STAGES — TOTP
  # ============================================================

  - model: authentik_stages_authenticator_totp.AuthenticatorTOTPStage
    state: present
    identifiers:
      name: zerogate-totp-setup
    attrs:
      name: zerogate-totp-setup
      friendly_name: "ZeroGate Authenticator (TOTP)"
      digits: 6

  # ============================================================
  # MFA STAGES — WEBAUTHN / PASSKEY (v1.1)
  # Supports hardware keys (YubiKey, etc.) and platform passkeys
  # (Face ID, Touch ID, Windows Hello)
  # ============================================================

  - model: authentik_stages_authenticator_webauthn.AuthenticatorWebAuthnStage
    state: present
    identifiers:
      name: zerogate-webauthn-setup
    attrs:
      name: zerogate-webauthn-setup
      friendly_name: "ZeroGate Passkey / Security Key"
      # cross-platform: hardware keys (YubiKey, etc.)
      # platform: built-in authenticators (Face ID, Touch ID, Windows Hello)
      # Leave empty to allow both (recommended)
      authenticator_attachment: ""
      # required: must use a resident/discoverable key (passkey behavior)
      # preferred: allow both — best for broad device compatibility
      resident_key_requirement: preferred
      # required: authenticator must verify user identity (PIN, biometric)
      user_verification: required

  # ============================================================
  # MFA VALIDATION — accepts TOTP or WebAuthn
  # not_configured_action: configure — forces enrollment on first login
  # ============================================================

  - model: authentik_stages_authenticator_validate.AuthenticatorValidateStage
    state: present
    identifiers:
      name: zerogate-mfa-validation
    attrs:
      name: zerogate-mfa-validation
      device_classes:
        - totp
        - webauthn
      # Forces MFA enrollment if no device registered yet
      not_configured_action: configure
      # Require user verification for WebAuthn (PIN or biometric)
      webauthn_user_verification: required
      # Allow users to choose which MFA method to use
      configuration_stages:
        - !KeyOf zerogate-totp-setup
        - !KeyOf zerogate-webauthn-setup

  # ============================================================
  # GROUPS
  # ============================================================

  - model: authentik_core.Group
    state: present
    identifiers:
      name: zerogate-users
    attrs:
      name: zerogate-users
      is_superuser: false

  - model: authentik_core.Group
    state: present
    identifiers:
      name: grafana-admin
    attrs:
      name: grafana-admin
      is_superuser: false

  - model: authentik_core.Group
    state: present
    identifiers:
      name: remote-access
    attrs:
      name: remote-access
      is_superuser: false

  # ============================================================
  # TIME-BASED ACCESS POLICY (v1.2)
  # Enforces access only during configured business hours.
  # Bind this policy to any flow or stage to restrict when
  # users can authenticate. By default Mon-Fri 08:00-18:00
  # in the Europe/Lisbon timezone.
  #
  # To apply to a flow:
  #   Admin → Flows → [flow] → Policy / Group / User Bindings
  #   → Create → Policy Binding → Select "zerogate-business-hours"
  # ============================================================

  - model: authentik_policies_expression.ExpressionPolicy
    state: present
    identifiers:
      name: zerogate-business-hours
    attrs:
      name: zerogate-business-hours
      expression: |
        from datetime import datetime, time
        import pytz

        # ── Configure here ─────────────────────────────────────
        TIMEZONE       = "Europe/Lisbon"   # IANA timezone
        BUSINESS_START = time(8, 0)        # 08:00
        BUSINESS_END   = time(18, 0)       # 18:00
        ALLOW_WEEKENDS = False             # Set True to allow Sat/Sun
        # ───────────────────────────────────────────────────────

        try:
            tz = pytz.timezone(TIMEZONE)
        except pytz.exceptions.UnknownTimeZoneError:
            # Fail open if timezone is misconfigured — log and allow
            ak_logger.error(f"Unknown timezone: {TIMEZONE}")
            return True

        now = datetime.now(tz)
        weekday = now.weekday()  # 0=Monday, 6=Sunday
        current_time = now.time()

        if not ALLOW_WEEKENDS and weekday >= 5:
            day_name = now.strftime("%A")
            ak_message(
                f"Access is only available Monday–Friday during business hours "
                f"({BUSINESS_START.strftime('%H:%M')}–{BUSINESS_END.strftime('%H:%M')} {TIMEZONE}). "
                f"Today is {day_name}."
            )
            return False

        if not (BUSINESS_START <= current_time <= BUSINESS_END):
            ak_message(
                f"Access is only available {BUSINESS_START.strftime('%H:%M')}–"
                f"{BUSINESS_END.strftime('%H:%M')} {TIMEZONE}. "
                f"Current time: {now.strftime('%H:%M')} {TIMEZONE}."
            )
            return False

        return True

  # Emergency bypass: members of this group skip the business-hours check.
  # Add on-call engineers here.
  - model: authentik_core.Group
    state: present
    identifiers:
      name: business-hours-exempt
    attrs:
      name: business-hours-exempt
      is_superuser: false

  # ============================================================
  # NOTIFICATION TRANSPORT — email alerts on security events
  # ============================================================

  - model: authentik_events.NotificationTransport
    state: present
    identifiers:
      name: zerogate-email-alert
    attrs:
      name: zerogate-email-alert
      mode: email
      send_once: false

  # Notify admin on login from new IP / suspicious activity
  - model: authentik_events.NotificationRule
    state: present
    identifiers:
      name: zerogate-login-alert
    attrs:
      name: zerogate-login-alert
      severity: warning
      transports:
        - !KeyOf zerogate-email-alert
      group: !KeyOf grafana-admin
