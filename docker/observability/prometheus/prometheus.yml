global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s
  external_labels:
    project: zerogate
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Host metrics (CPU, mem, disk, network)
  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]
    relabel_configs:
      - target_label: host
        replacement: zerogate-server

  # Container metrics
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metric_relabel_configs:
      # Keep only essential container metrics to reduce cardinality
      - source_labels: [__name__]
        regex: 'container_(cpu_usage_seconds_total|memory_usage_bytes|network_receive_bytes_total|network_transmit_bytes_total|fs_usage_bytes|last_seen|start_time_seconds)'
        action: keep

  # Loki internal metrics
  - job_name: loki
    static_configs:
      - targets: [loki:3100]
    metrics_path: /metrics
